<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <meta
      name="viewport"
      content="width=device-width,
      initial-scale=1.0,
      maximum-scale=1.0,
      user-scalable=no"
    />

    <meta
      name="theme-color"
      content="#2563eb"
    />

    <meta
      name="description"
      content="RenoVision - AI-powered smart
      interior renovation planner"
    />

    <!-- PWA on Android -->
    <meta
      name="mobile-web-app-capable"
      content="yes"
    />

    <!-- PWA on iPhone -->
    <meta
      name="apple-mobile-web-app-capable"
      content="yes"
    />

    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="default"
    />

    <meta
      name="apple-mobile-web-app-title"
      content="RenoVision"
    />

    <!-- Manifest -->
    <link
      rel="manifest"
      href="%PUBLIC_URL%/manifest.json"
    />

    <!-- Icon -->
    <link
      rel="apple-touch-icon"
      href="%PUBLIC_URL%/logo192.png"
    />

    <title>RenoVision - AI Interior Planner</title>
  </head>
  <body>
    <noscript>
      You need to enable JavaScript to run
      this app.
    </noscript>
    <div id="root"></div>
  </body>
</html>
